name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Typecheck, lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
        env:
          # Placeholders: the build only inlines these strings, it never calls
          # Supabase. The real values live in the Vercel project settings.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: build-time-placeholder

  database:
    name: Row Level Security tests
    runs-on: ubuntu-latest

    # A throwaway PostgreSQL, so the tests can drop and rebuild the schema from
    # supabase-schema.sql on every run. They never touch a real project.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:db
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
